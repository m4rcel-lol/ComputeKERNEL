name: Build Main Live/Setup ISO

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-full-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc binutils grub-pc-bin grub-common xorriso mtools python3

      - name: Run full kernel build and repository checks
        run: |
          make kernel
          make lint
          make test

  build-main-iso:
    needs: validate-full-kernel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc binutils grub-pc-bin grub-common xorriso mtools

      - name: Build kernel and live/setup ISO
        run: make iso

      - name: Verify ISO is a valid El Torito image
        run: |
          test -f out/computekernel.iso
          file out/computekernel.iso | grep -i "ISO 9660"

      - name: Upload main ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: computekernel-main-live-setup-iso
          path: out/computekernel.iso
          if-no-files-found: error
