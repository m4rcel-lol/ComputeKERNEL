name: Build VM Live/Setup ISO

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-full-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc binutils grub-pc-bin grub-common xorriso mtools python3

      - name: Run full kernel build and repository checks
        run: |
          make kernel
          make lint
          make test

  build-vm-iso:
    needs: validate-full-kernel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vm_target:
          - virtualbox
          - vmware
          - qemu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc binutils grub-pc-bin grub-common xorriso mtools

      - name: Build kernel and VM live/setup ISO for ${{ matrix.vm_target }}
        run: make iso VM_TARGET=${{ matrix.vm_target }}

      - name: Verify ISO is a valid El Torito image
        run: |
          file out/computekernel-${{ matrix.vm_target }}.iso | grep -i "ISO 9660"

      - name: Upload VM ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: computekernel-${{ matrix.vm_target }}-live-setup-iso
          path: out/computekernel-${{ matrix.vm_target }}.iso
          if-no-files-found: error
