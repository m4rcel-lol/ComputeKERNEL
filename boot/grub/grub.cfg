set timeout=5
set default=0

# Keep GRUB in plain text path for widest compatibility on bare metal and Ventoy.
# Do not load video modules here: on some firmware/USB boot combinations
# (including some Ventoy paths) probing video backends can still trigger
# "no suitable video mode found" and "no console will be available to OS".

# Force GRUB to use the plain VGA text console.
# Without this, GRUB defaults to gfxterm and emits:
#   "no suitable video mode found"
#   "no console will be available to OS"
# on machines whose firmware does not expose a compatible VESA/GOP mode.
# ComputeKERNEL writes directly to the VGA frame buffer at 0xB8000 and
# does not rely on GRUB to set up a graphical environment.
set gfxmode=text
set gfxpayload=text
terminal_input  console
terminal_output console

menuentry "ComputeKERNEL (Live Root)" {
    multiboot2 /boot/computekernel.elf
    boot
}

menuentry "ComputeKERNEL (Setup Installer)" {
    multiboot2 /boot/computekernel.elf ck.mode=setup
    boot
}
